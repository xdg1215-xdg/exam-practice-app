name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: success()
        run: npm install --legacy-peer-deps

      - name: Build web app
        if: success()
        run: npm run build

      - name: Setup Java
        if: success()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Android SDK
        if: success()
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools latest
          rm cmdtools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Install Android SDK components
        if: success()
        run: |
          set -e
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          # 接受所有 license：每行一个 y + 换行，覆盖5份协议
          (for i in 1 2 3 4 5; do echo y; done) | sdkmanager --licenses > /dev/null
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Add Capacitor Android
        if: success()
        run: |
          rm -rf android
          npx cap add android

      - name: Sync Capacitor
        if: success()
        run: npx cap sync android

      - name: Create local.properties
        if: success()
        run: |
          mkdir -p android
          echo "sdk.dir=$HOME/android-sdk" > android/local.properties
          echo "flutter.sdk=/dev/null" >> android/local.properties || true

      - name: Generate launcher icons (all densities + adaptive)
        if: success()
        run: |
          set -e
          # @capacitor/assets 会在 android/app/src/main/res/ 下生成 5 密度 × (png/webp) + adaptive
          node node_modules/@capacitor/assets/bin/capacitor-assets generate \
            --android \
            --assetSources src/assets/logo.png \
            --logoBackground "#b71c1c" \
            --logoPadding 0.1

      - name: Build APK
        if: success()
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
